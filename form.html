<style>
:root{--ink:#14201f;--muted:#65736f;--line:#dbe5e0;--paper:#fbf7ee;--white:#fff;--teal:#0f766e;--tealDark:#0b4f49;--orange:#e15b2d;--amber:#f5b84b;--gold:#c99a3f;--mist:#edf6f3;--danger:#b42318;--shadow:0 20px 60px rgba(20,32,31,.12)}
*{box-sizing:border-box}
html,body{width:100%;max-width:100%;overflow-x:hidden}
html{scroll-behavior:smooth}
body{margin:0;font-family:"Noto Sans JP",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbf7ee 0%,#f4f7f2 44%,#fff 100%);line-height:1.75;letter-spacing:0}
a{color:inherit}
body,h1,h2,h3,p,li,label,span,strong,input,textarea,button{line-break:strict;word-break:normal;overflow-wrap:break-word}
h1,h2{text-wrap:balance}
.site-header{position:sticky;top:0;z-index:10;background:rgba(255,252,246,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(20,32,31,.08);box-shadow:0 10px 30px rgba(20,32,31,.06)}
.nav{width:min(1040px,100%);margin:0 auto;min-height:68px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;text-decoration:none;white-space:nowrap}
.brand-mark{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--teal),var(--gold));font-size:18px}
.nav-link{font-weight:800;color:var(--tealDark);text-decoration:none}
.hero{position:relative;overflow:hidden;background:#0b3834;color:#fff}
.hero:before{content:"";position:absolute;inset:0;background-image:linear-gradient(90deg,rgba(6,30,28,.92),rgba(9,52,48,.74) 58%,rgba(9,52,48,.38)),url("assets/hero-v2.png");background-size:cover;background-position:center;opacity:.96}
.hero-inner{position:relative;width:min(1040px,100%);margin:0 auto;padding:56px 20px 64px}
.eyebrow{display:inline-flex;margin:0 0 16px;padding:8px 12px;border:1px solid rgba(245,184,75,.42);border-radius:999px;background:rgba(255,255,255,.08);color:#ffe0a0;font-size:14px;font-weight:900}
h1{max-width:780px;margin:0;font-size:clamp(34px,6.2vw,62px);line-height:1.12;letter-spacing:0}
.subline{margin:12px 0 0;color:#ffe0a0;font-size:20px;font-weight:900}
.hero-copy{max-width:760px;margin:22px 0 0;color:rgba(255,255,255,.9);font-size:18px}
.form-wrap{width:min(1040px,100%);margin:-34px auto 0;padding:0 20px 80px;position:relative;z-index:2}
.form-card{width:min(760px,100%);margin:0 auto}
form{min-width:0;padding:28px;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:var(--shadow)}
.side-card{position:sticky;top:92px;min-width:0;padding:24px;border:1px solid rgba(15,118,110,.18);border-radius:10px;background:linear-gradient(180deg,#fff,#f2fbf8);box-shadow:0 18px 42px rgba(20,32,31,.1)}
.side-card h2{margin:0 0 12px;font-size:22px;line-height:1.35}
.side-card p{margin:0;color:var(--muted)}
.side-list{display:grid;gap:12px;margin:18px 0 0;padding:0;list-style:none}
.side-list li{position:relative;padding-left:28px;color:var(--muted)}
.side-list li:before{content:"✓";position:absolute;left:0;top:0;color:var(--teal);font-weight:900}
.trust-badges{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 20px}
.trust-badge{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;background:#eef8f7;color:var(--tealDark);font-size:13px;font-weight:900}
.flow-box{margin:0 0 24px;padding:20px;border:1px solid rgba(15,118,110,.18);border-radius:10px;background:linear-gradient(180deg,#fffdf8,#f4fbf8)}
.flow-title{margin:0 0 14px;color:var(--tealDark);font-size:20px;line-height:1.35}
.flow-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:0;padding:0;list-style:none}
.flow-step{position:relative;min-width:0;padding:14px 12px;border:1px solid var(--line);border-radius:8px;background:#fff}
.flow-step:after{content:"";position:absolute;top:50%;right:-9px;width:8px;height:1px;background:var(--gold)}
.flow-step:last-child:after{display:none}
.flow-icon{display:grid;place-items:center;width:30px;height:30px;margin-bottom:9px;border-radius:999px;color:#fff;background:linear-gradient(135deg,var(--teal),var(--gold));font-weight:900;font-size:13px}
.flow-step strong{display:block;font-size:14px;line-height:1.45}
.section{padding:22px 0;border-top:1px solid var(--line)}
.section:first-child{padding-top:0;border-top:0}
.section-title{margin:0 0 18px;color:var(--tealDark);font-size:22px;line-height:1.35}
.field{display:grid;gap:8px;margin-top:18px}
.field:first-of-type{margin-top:0}
label,.legend{font-weight:900}
.required{display:inline-flex;margin-left:8px;padding:2px 7px;border-radius:999px;background:#fff0eb;color:var(--orange);font-size:12px;font-weight:900;vertical-align:middle}
.optional{display:inline-flex;margin-left:8px;padding:2px 7px;border-radius:999px;background:#eef8f7;color:var(--tealDark);font-size:12px;font-weight:900;vertical-align:middle}
.help{margin:0;color:var(--muted);font-size:14px;line-height:1.65}
input[type="text"],input[type="email"],textarea{width:100%;border:1px solid #cdd8d4;border-radius:8px;background:#fff;padding:14px 15px;color:var(--ink);font:inherit;line-height:1.5;outline:none}
textarea{min-height:112px;resize:vertical}
input:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(15,118,110,.12)}
fieldset{min-width:0;margin:18px 0 0;padding:0;border:0}
.choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
.choice{display:flex;align-items:flex-start;gap:10px;min-width:0;padding:12px 13px;border:1px solid var(--line);border-radius:8px;background:#fff}
.choice input{flex:0 0 auto;margin-top:6px;accent-color:var(--teal)}
.choice span{min-width:0;color:var(--ink);font-weight:700;line-height:1.55}
.radio-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.radio-row .choice{min-width:150px}
.honeypot{position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
.form-actions{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:26px}
.submit-btn{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:14px 24px;border:0;border-radius:8px;color:#fff;background:linear-gradient(135deg,var(--orange),var(--gold));font:inherit;font-weight:900;line-height:1.2;cursor:pointer;box-shadow:0 16px 34px rgba(190,111,46,.26)}
.submit-btn:disabled{cursor:not-allowed;opacity:.68}
.safe-note{display:flex;gap:10px;align-items:flex-start;margin:22px 0 0;padding:13px 14px;border-radius:8px;background:#f6fbf9;color:var(--muted);font-size:13px;line-height:1.65}
.safe-note:before{content:"✓";flex:0 0 auto;display:grid;place-items:center;width:22px;height:22px;border-radius:999px;color:#fff;background:var(--teal);font-weight:900}
.back-link{color:var(--tealDark);font-weight:900;text-decoration:underline;text-underline-offset:4px}
.notice{display:none;margin-top:18px;padding:14px 16px;border-radius:8px;font-weight:800}
.notice.is-error{display:block;border:1px solid #f4b4aa;background:#fff3f1;color:var(--danger)}
.notice.is-success{display:block;border:1px solid #b7dfd5;background:#effbf7;color:var(--tealDark)}
footer{padding:28px 20px;color:var(--muted);background:#f0eadf;font-size:13px}
.footer-inner{width:min(1040px,100%);margin:0 auto;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-inner a{color:var(--tealDark);font-weight:800}
@media(max-width:900px){
  .flow-steps{grid-template-columns:repeat(2,minmax(0,1fr))}
  .flow-step:nth-child(2):after{display:none}
  .hero-inner{padding:48px 18px 58px}
  .form-wrap{padding:0 18px 64px}
  form{padding:24px 18px}
}
@media(max-width:560px){
  .nav{padding:0 16px}
  .brand span:last-child{font-size:14px}
  .nav-link{font-size:13px}
  .hero-copy{font-size:16px}
  .choice-grid{grid-template-columns:minmax(0,1fr)}
  .flow-steps{grid-template-columns:minmax(0,1fr)}
  .flow-step:after{display:none}
  .radio-row{display:grid;grid-template-columns:minmax(0,1fr)}
  .radio-row .choice{min-width:0}
  .submit-btn,.back-link{width:100%}
}
</style>

<body>

<header class="site-header">
  <nav class="nav" aria-label="主要ナビゲーション">
    <a class="brand" href="/">
      <span class="brand-mark" aria-hidden="true">防</span>
      <span>家庭防災設計</span>
    </a>
    <a class="nav-link" href="/">LPに戻る</a>
  </nav>
</header>

<main>
  <section class="hero">
    <div class="hero-inner">
      <h1>30分無料相談 予約フォーム</h1>
    </div>
  </section>

  <div class="form-wrap">
    <div class="form-card">
      <form id="diagnosis-form" novalidate>
        <div class="trust-badges" aria-label="フォームの安心情報">
          <span class="trust-badge">約30秒で完了</span>
          <span class="trust-badge">こちらからの営業連絡なし</span>
          <span class="trust-badge">24時間以内にメール</span>
        </div>

        <div class="flow-box" aria-label="お申し込み後の流れ">
          <h2 class="flow-title">お申し込み後の流れ</h2>
          <ol class="flow-steps">
            <li class="flow-step"><span class="flow-icon">1</span><strong>フォーム送信<br>約30秒</strong></li>
            <li class="flow-step"><span class="flow-icon">2</span><strong>担当より24時間以内にメール</strong></li>
            <li class="flow-step"><span class="flow-icon">3</span><strong>30分オンライン相談</strong></li>
            <li class="flow-step"><span class="flow-icon">4</span><strong>ご家庭専用の改善ポイントをご提案</strong></li>
          </ol>
        </div>

        <div class="section">
          <h2 class="section-title">ご連絡先</h2>
          <div class="field">
            <label for="email">メールアドレス<span class="required">必須</span></label>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="name">お名前<span class="required">必須</span></label>
            <input id="name" name="name" type="text" autocomplete="name" required>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">ご家庭の状況</h2>
          <fieldset>
            <legend class="legend">家族構成<span class="required">必須</span></legend>
            <div class="radio-row">
              <label class="choice"><input type="radio" name="familyType" value="一人暮らし" required><span>一人暮らし</span></label>
              <label class="choice"><input type="radio" name="familyType" value="夫婦" required><span>夫婦</span></label>
              <label class="choice"><input type="radio" name="familyType" value="夫婦＋子ども" required><span>夫婦＋子ども</span></label>
              <label class="choice"><input type="radio" name="familyType" value="三世代" required><span>三世代</span></label>
              <label class="choice"><input type="radio" name="familyType" value="その他" required><span>その他</span></label>
            </div>
          </fieldset>
        </div>

        <div class="section">
          <h2 class="section-title">相談したいこと</h2>
          <fieldset>
            <legend class="legend">一番困っていること<span class="required">必須</span></legend>
            <div class="choice-grid">
              <label class="choice"><input type="checkbox" name="concerns" value="何を備蓄すればいいかわからない"><span>何を備蓄すればいいかわからない</span></label>
              <label class="choice"><input type="checkbox" name="concerns" value="備蓄量がわからない"><span>備蓄量がわからない</span></label>
              <label class="choice"><input type="checkbox" name="concerns" value="家具固定が不安"><span>家具固定が不安</span></label>
              <label class="choice"><input type="checkbox" name="concerns" value="子どもの備蓄"><span>子どもの備蓄</span></label>
              <label class="choice"><input type="checkbox" name="concerns" value="ペット対策"><span>ペット対策</span></label>
              <label class="choice"><input type="checkbox" name="concerns" value="その他"><span>その他</span></label>
            </div>
          </fieldset>
          <div class="field">
            <label for="concernSummary">お困りごとの概要<span class="optional">任意</span></label>
            <textarea id="concernSummary" name="concernSummary"></textarea>
          </div>
          <div class="field">
            <label for="preferredDate">ご相談可能な日時<span class="optional">任意</span></label>
            <p class="help">平日夜・土日も対応しています。候補を2〜3つご記入ください。</p>
            <textarea id="preferredDate" name="preferredDate"></textarea>
          </div>
        </div>

        <div class="honeypot" aria-hidden="true">
          <label for="website">Webサイト</label>
          <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
        </div>

        <p class="safe-note">ご入力いただいた内容は無料診断以外には利用いたしません。</p>

        <div class="form-actions">
          <button class="submit-btn" type="submit">30分無料相談を予約する</button>
          <a class="back-link" href="/">LPに戻る</a>
        </div>
        <div id="form-notice" class="notice" role="status" aria-live="polite"></div>
      </form>

    </div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <span>© 家庭防災設計</span>
    <a href="/privacy-policy">プライバシーポリシー</a>
  </div>
</footer>

<script>
(function(){
  var form = document.getElementById('diagnosis-form');
  var notice = document.getElementById('form-notice');
  var submitButton = form.querySelector('.submit-btn');

  function showNotice(type, message) {
    notice.className = 'notice is-' + type;
    notice.textContent = message;
  }

  function getChecked(name) {
    return Array.prototype.slice.call(form.querySelectorAll('input[name="' + name + '"]:checked')).map(function(input){
      return input.value;
    });
  }

  function redirectAfterTracking() {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'form_submit'
    });
    window.setTimeout(function(){
      window.location.href = '/thanks';
    }, 800);
  }

  form.addEventListener('submit', function(event){
    event.preventDefault();
    notice.className = 'notice';
    notice.textContent = '';

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    var concerns = getChecked('concerns');
    if (concerns.length === 0) {
      showNotice('error', '「一番困っていること」を1つ以上選択してください。');
      return;
    }

    var payload = {
      email: form.email.value.trim(),
      name: form.name.value.trim(),
      familyType: form.familyType.value,
      concerns: concerns,
      concernSummary: form.concernSummary.value.trim(),
      preferredDate: form.preferredDate.value.trim(),
      website: form.website.value
    };

    submitButton.disabled = true;
    submitButton.textContent = '送信中...';

    fetch('/api/contact', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    }).then(function(response){
      if (!response.ok) {
        throw new Error('送信に失敗しました');
      }
      showNotice('success', '送信しました。完了画面に移動します。');
      redirectAfterTracking();
    }).catch(function(){
      showNotice('error', '送信できませんでした。時間をおいて再度お試しください。');
      submitButton.disabled = false;
      submitButton.textContent = '30分無料相談を予約する';
    });
  });
})();
</script>
